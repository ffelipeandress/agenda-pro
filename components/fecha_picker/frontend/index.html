<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <style>
        :root {
            --purple: #6f1d8f;
            --purple-dark: #51126c;
            --purple-soft: #f5e7fb;
            --border: #dfcce8;
            --text: #3d3044;
            --muted: #7f7485;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow: visible;
            background: transparent;
            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        .picker-shell {
            width: 100%;
            padding: 2px 0 6px 0;
        }

        .picker-label {
            margin: 0 0 7px 2px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.7px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        #fecha {
            width: 100%;
            min-height: 58px;
            padding: 0 50px 0 17px;
            border: 1px solid var(--border);
            border-radius: 16px;
            outline: none;
            background: #ffffff;
            color: var(--text);
            font-size: 16px;
            font-weight: 750;
            box-shadow: 0 5px 18px rgba(63, 32, 76, 0.05);
            cursor: pointer;
        }

        #fecha:focus {
            border-color: var(--purple);
            box-shadow:
                0 0 0 3px rgba(111, 29, 143, 0.12),
                0 5px 18px rgba(63, 32, 76, 0.05);
        }

        .calendar-icon {
            position: absolute;
            top: 50%;
            right: 17px;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 21px;
        }

        .flatpickr-calendar {
            width: 100% !important;
            max-width: 360px;
            border: 1px solid var(--border);
            border-radius: 17px;
            box-shadow: 0 12px 32px rgba(55, 26, 66, 0.18);
            overflow: hidden;
        }

        .flatpickr-months {
            padding: 8px 5px 3px 5px;
            background: linear-gradient(135deg, #f6e8fb, #ffffff);
        }

        .flatpickr-current-month {
            color: var(--purple-dark);
            font-weight: 800;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            font-weight: 800;
        }

        span.flatpickr-weekday {
            color: var(--purple-dark);
            font-weight: 800;
        }

        .flatpickr-day {
            border-radius: 10px;
            color: var(--text);
        }

        .flatpickr-day.today {
            border-color: var(--purple);
            color: var(--purple);
            font-weight: 800;
        }

        .flatpickr-day.selected,
        .flatpickr-day.startRange,
        .flatpickr-day.endRange,
        .flatpickr-day.selected:hover {
            border-color: var(--purple);
            background: var(--purple);
            color: #ffffff;
        }

        .flatpickr-day:hover {
            border-color: var(--purple-soft);
            background: var(--purple-soft);
        }

        @media (max-width: 420px) {
            .flatpickr-calendar {
                max-width: calc(100vw - 24px);
            }
        }
    </style>
</head>

<body>
    <div class="picker-shell">
        <div class="picker-label">Seleccionar fecha</div>

        <div class="input-wrapper">
            <input
                id="fecha"
                type="text"
                inputmode="none"
                aria-label="Seleccionar fecha"
                readonly
            />
            <span class="calendar-icon">📅</span>
        </div>
    </div>

    <script>
        const STREAMLIT_READY = "streamlit:componentReady";
        const STREAMLIT_RENDER = "streamlit:render";
        const STREAMLIT_SET_VALUE = "streamlit:setComponentValue";
        const STREAMLIT_SET_HEIGHT = "streamlit:setFrameHeight";

        let picker = null;
        let currentValue = null;

        function sendMessage(type, data = {}) {
            window.parent.postMessage(
                {
                    isStreamlitMessage: true,
                    type,
                    ...data,
                },
                "*"
            );
        }

        function setHeight(height = 78) {
            sendMessage(STREAMLIT_SET_HEIGHT, { height });
        }

        function setComponentValue(value) {
            sendMessage(STREAMLIT_SET_VALUE, { value });
        }

        function formatLongDate(dateObj) {
            const formatter = new Intl.DateTimeFormat("es-CL", {
                weekday: "long",
                day: "numeric",
                month: "long",
                year: "numeric",
            });

            const texto = formatter.format(dateObj);
            return texto.charAt(0).toUpperCase() + texto.slice(1);
        }

        function createPicker(value) {
            const input = document.getElementById("fecha");

            picker = flatpickr(input, {
                locale: {
                    ...flatpickr.l10ns.es,
                    firstDayOfWeek: 1,
                },
                defaultDate: value,
                dateFormat: "Y-m-d",
                disableMobile: true,
                allowInput: false,
                clickOpens: true,
                monthSelectorType: "dropdown",
                prevArrow: "‹",
                nextArrow: "›",

                onReady: function(selectedDates) {
                    if (selectedDates.length) {
                        input.value = formatLongDate(selectedDates[0]);
                    }
                    setHeight(78);
                },

                onOpen: function() {
                    setTimeout(() => setHeight(430), 0);
                },

                onClose: function() {
                    setTimeout(() => setHeight(78), 80);
                },

                onChange: function(selectedDates, dateStr) {
                    if (!selectedDates.length) {
                        return;
                    }

                    currentValue = dateStr;
                    input.value = formatLongDate(selectedDates[0]);
                    setComponentValue(dateStr);
                },
            });
        }

        function updatePicker(value) {
            if (!picker) {
                createPicker(value);
                currentValue = value;
                return;
            }

            if (value && value !== currentValue) {
                picker.setDate(value, false);
                currentValue = value;

                const selected = picker.selectedDates[0];
                if (selected) {
                    document.getElementById("fecha").value =
                        formatLongDate(selected);
                }
            }
        }

        window.addEventListener("message", function(event) {
            const data = event.data;

            if (
                !data ||
                data.type !== STREAMLIT_RENDER ||
                !data.args
            ) {
                return;
            }

            updatePicker(data.args.value);
        });

        sendMessage(STREAMLIT_READY, { apiVersion: 1 });
        setHeight(78);
    </script>
</body>
</html>
